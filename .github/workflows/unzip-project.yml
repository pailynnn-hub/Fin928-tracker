name: Unzip project

on:
  push:
    paths:
      - "*.zip"
      - ".github/workflows/unzip-project.yml"

permissions:
  contents: write

jobs:
  unzip:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Unzip project files
        run: |
          ZIP_FILE=$(ls *.zip 2>/dev/null | head -n 1 || true)

          if [ -z "$ZIP_FILE" ]; then
            echo "No zip file found"
            exit 0
          fi

          mkdir extracted
          unzip -o "$ZIP_FILE" -d extracted

          shopt -s dotglob nullglob
          entries=(extracted/*)

          if [ ${#entries[@]} -eq 1 ] && [ -d "${entries[0]}" ]; then
            cp -R "${entries[0]}"/. .
          else
            cp -R extracted/. .
          fi

          rm -rf extracted "$ZIP_FILE"

      - name: Commit unzipped files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Unzip project files" || echo "No changes to commit"
          git push
